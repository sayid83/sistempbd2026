<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pengurusan Kelas — Sistem PBD 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

  <style>
    /* ============================================================
       BASE & VARIABLES — sama seperti index.html
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy-darkest : #060e1e;
      --navy-dark    : #0b1629;
      --navy-mid     : #0f2040;
      --navy-light   : #1a3258;
      --navy-border  : #1e3a5f;
      --accent-blue  : #4f8ef7;
      --accent-cyan  : #38bdf8;
      --sidebar-w    : 220px;
      --header-h     : 56px;
      --white        : #ffffff;
      --text-dim     : #8fa8c8;
      --text-muted   : #5a7a9f;
      --bg-main      : #f0f3f8;
      --card-bg      : #ffffff;
      --radius       : 12px;
      --shadow       : 0 2px 16px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: #1e293b;
      min-height: 100vh;
    }

    /* ============================================================
       TOPBAR
    ============================================================ */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: linear-gradient(90deg, var(--navy-darkest), var(--navy-dark));
      border-bottom: 1px solid var(--navy-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,.4);
      overflow: hidden;
    }
    .topbar::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.03), transparent);
      animation: shimmerBar 5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes shimmerBar { 0% { left:-100%; } 100% { left:200%; } }

    .topbar-brand { display:flex; align-items:center; gap:10px; flex:1; }
    .hamburger {
      display: none;
      background: none; border: none;
      color: var(--white); font-size: 20px;
      cursor: pointer; padding: 6px; margin-right: 8px;
      border-radius: 6px; transition: background .2s;
    }
    .hamburger:hover { background: rgba(255,255,255,.08); }
    .brand-icon {
      width:32px; height:32px;
      background: linear-gradient(135deg, var(--accent-blue), #2563eb);
      border-radius:8px; display:flex; align-items:center;
      justify-content:center; font-size:15px; color:var(--white);
      box-shadow: 0 0 12px rgba(79,142,247,.4);
    }
    .brand-text h2 { color:var(--white); font-size:15px; font-weight:700; line-height:1; }
    .brand-text span { color:var(--text-dim); font-size:11px; }

    .topbar-actions { display:flex; align-items:center; gap:8px; }
    .topbar-btn {
      display:flex; align-items:center; gap:6px;
      padding:7px 14px; border-radius:8px;
      border:1px solid var(--navy-border);
      background:rgba(255,255,255,.05);
      color:var(--text-dim); font-size:12px; font-weight:500;
      cursor:pointer; transition:all .2s;
      font-family:'Inter',sans-serif; text-decoration:none;
    }
    .topbar-btn:hover { background:rgba(255,255,255,.1); color:var(--white); }
    .topbar-btn.accent {
      background:linear-gradient(135deg,var(--accent-blue),#2563eb);
      border-color:transparent; color:var(--white);
      box-shadow:0 2px 12px rgba(79,142,247,.3);
    }
    .topbar-btn.danger {
      background:rgba(239,68,68,.1); border-color:rgba(239,68,68,.2); color:#fca5a5;
    }
    .topbar-btn.danger:hover { background:rgba(239,68,68,.2); }

    /* ============================================================
       SIDEBAR
    ============================================================ */
    .sidebar {
      position: fixed;
      top: var(--header-h); left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--header-h));
      background: linear-gradient(180deg, var(--navy-dark), var(--navy-darkest));
      border-right: 1px solid var(--navy-border);
      overflow-y: auto; overflow-x: hidden;
      z-index: 90;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      scrollbar-width: thin;
      scrollbar-color: var(--navy-light) transparent;
    }
    .sidebar::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 1px; height: 100%;
      background: linear-gradient(180deg,
        transparent, rgba(79,142,247,.4) 30%,
        rgba(56,189,248,.3) 60%, transparent);
      animation: sidebarGloss 6s ease-in-out infinite;
    }
    @keyframes sidebarGloss {
      0%,100% { opacity:.4; transform:translateY(-10%); }
      50%     { opacity:1;  transform:translateY(10%); }
    }

    .sidebar-section { padding: 20px 12px 8px; }
    .sidebar-label {
      font-size:10px; font-weight:700;
      letter-spacing:1.2px; text-transform:uppercase;
      color:var(--text-muted); padding:0 8px; margin-bottom:6px;
    }
    .nav-item {
      display:flex; align-items:center; gap:10px;
      padding:9px 12px; border-radius:8px;
      cursor:pointer; color:var(--text-dim);
      font-size:13px; font-weight:500;
      transition:all .2s; margin-bottom:2px;
      text-decoration:none; position:relative; overflow:hidden;
    }
    .nav-item:hover { background:rgba(255,255,255,.06); color:var(--white); }
    .nav-item.active {
      background:linear-gradient(135deg,rgba(79,142,247,.25),rgba(79,142,247,.1));
      color:var(--white); border:1px solid rgba(79,142,247,.25);
    }
    .nav-item.active::before {
      content:''; position:absolute;
      left:0; top:20%; bottom:20%; width:3px;
      background:linear-gradient(180deg,var(--accent-blue),var(--accent-cyan));
      border-radius:0 3px 3px 0;
      box-shadow:0 0 8px rgba(79,142,247,.8);
    }
    .nav-item i { width:18px; text-align:center; font-size:14px; }
    .nav-item.active i { color:var(--accent-cyan); }
    .nav-badge {
      margin-left:auto; background:rgba(255,255,255,.08);
      color:var(--text-dim); font-size:10px;
      padding:2px 7px; border-radius:20px; font-weight:600;
    }
    .nav-item.active .nav-badge { background:rgba(79,142,247,.2); color:var(--accent-cyan); }

    .sidebar-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5); z-index:89;
      backdrop-filter:blur(2px);
    }

    /* ============================================================
       MAIN CONTENT
    ============================================================ */
    .main-content {
      margin-left: var(--sidebar-w);
      margin-top: var(--header-h);
      padding: 28px;
    }

    .page-header {
      display:flex; align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap; gap:16px;
      margin-bottom:24px;
    }
    .page-header-left h1 {
      font-size:22px; font-weight:700; color:#0f172a;
      display:flex; align-items:center; gap:10px;
    }
    .page-header-left p { color:#64748b; font-size:13px; margin-top:4px; }

    /* ============================================================
       BUTANG UTAMA
    ============================================================ */
    .btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:9px 18px; border-radius:9px;
      font-size:13px; font-weight:600;
      cursor:pointer; transition:all .2s;
      font-family:'Inter',sans-serif; border:none;
      text-decoration:none;
    }
    .btn-primary {
      background:linear-gradient(135deg,var(--accent-blue),#2563eb);
      color:var(--white);
      box-shadow:0 2px 12px rgba(79,142,247,.35);
    }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(79,142,247,.5); }
    .btn-success {
      background:linear-gradient(135deg,#22c55e,#16a34a);
      color:var(--white);
      box-shadow:0 2px 12px rgba(34,197,94,.3);
    }
    .btn-success:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(34,197,94,.4); }
    .btn-danger {
      background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
      color:#dc2626;
    }
    .btn-danger:hover { background:rgba(239,68,68,.2); }
    .btn-ghost {
      background:var(--white); border:1px solid #e2e8f0; color:#374151;
    }
    .btn-ghost:hover { background:#f8fafc; }
    .btn-sm { padding:6px 12px; font-size:12px; border-radius:7px; }

    /* ============================================================
       TABS — KELAS / MURID
    ============================================================ */
    .tab-bar {
      display:flex; gap:4px;
      background:var(--white);
      border:1px solid #e2e8f0;
      border-radius:10px;
      padding:4px;
      margin-bottom:20px;
      width:fit-content;
    }
    .tab-btn {
      padding:8px 20px; border-radius:8px;
      border:none; background:none;
      font-size:13px; font-weight:500;
      color:#64748b; cursor:pointer;
      transition:all .2s;
      font-family:'Inter',sans-serif;
    }
    .tab-btn.active {
      background:linear-gradient(135deg,var(--accent-blue),#2563eb);
      color:var(--white);
      box-shadow:0 2px 8px rgba(79,142,247,.3);
    }

    /* ============================================================
       TABLE
    ============================================================ */
    .table-card {
      background:var(--card-bg);
      border-radius:var(--radius);
      border:1px solid #e2e8f0;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .table-toolbar {
      display:flex; align-items:center;
      justify-content:space-between;
      padding:16px 20px;
      border-bottom:1px solid #f1f5f9;
      flex-wrap:wrap; gap:12px;
    }
    .search-input {
      display:flex; align-items:center; gap:8px;
      background:#f8fafc; border:1px solid #e2e8f0;
      border-radius:8px; padding:8px 12px;
    }
    .search-input i { color:#94a3b8; font-size:13px; }
    .search-input input {
      border:none; background:none; outline:none;
      font-size:13px; color:#374151;
      font-family:'Inter',sans-serif; width:220px;
    }
    .search-input input::placeholder { color:#94a3b8; }

    .data-table { width:100%; border-collapse:collapse; }
    .data-table thead tr {
      background:#f8fafc;
      border-bottom:1px solid #e2e8f0;
    }
    .data-table th {
      padding:12px 16px; text-align:left;
      font-size:11px; font-weight:700;
      color:#64748b; text-transform:uppercase;
      letter-spacing:.6px; white-space:nowrap;
    }
    .data-table td {
      padding:12px 16px;
      font-size:13px; color:#374151;
      border-bottom:1px solid #f1f5f9;
      vertical-align:middle;
    }
    .data-table tbody tr:last-child td { border-bottom:none; }
    .data-table tbody tr:hover { background:#f8fafc; }

    .badge {
      display:inline-block; padding:3px 10px;
      border-radius:20px; font-size:11px; font-weight:600;
    }
    .badge-blue  { background:#eff6ff; color:#2563eb; }
    .badge-green { background:#f0fdf4; color:#16a34a; }
    .badge-amber { background:#fffbeb; color:#d97706; }
    .badge-purple{ background:#faf5ff; color:#7c3aed; }

    .empty-state {
      text-align:center; padding:60px 20px; color:#94a3b8;
    }
    .empty-state i { font-size:48px; margin-bottom:16px; display:block; opacity:.4; }
    .empty-state p { font-size:14px; }

    /* ============================================================
       MODAL
    ============================================================ */
    .modal-backdrop {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5);
      backdrop-filter:blur(4px);
      z-index:200;
      align-items:center; justify-content:center;
    }
    .modal-backdrop.open { display:flex; }

    .modal {
      background:var(--white);
      border-radius:16px;
      width:100%; max-width:520px;
      max-height:90vh; overflow-y:auto;
      box-shadow:0 24px 64px rgba(0,0,0,.2);
      animation:modalIn .25s cubic-bezier(.4,0,.2,1);
      margin:16px;
    }
    @keyframes modalIn {
      from { transform:scale(.95); opacity:0; }
      to   { transform:scale(1);   opacity:1; }
    }
    .modal-header {
      display:flex; align-items:center;
      justify-content:space-between;
      padding:20px 24px;
      border-bottom:1px solid #f1f5f9;
    }
    .modal-header h3 { font-size:16px; font-weight:700; color:#0f172a; }
    .modal-close {
      width:32px; height:32px; border-radius:8px;
      border:none; background:#f1f5f9;
      color:#64748b; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; transition:all .2s;
    }
    .modal-close:hover { background:#e2e8f0; color:#0f172a; }
    .modal-body { padding:24px; }
    .modal-footer {
      display:flex; justify-content:flex-end; gap:10px;
      padding:16px 24px;
      border-top:1px solid #f1f5f9;
    }

    /* ============================================================
       FORM FIELDS
    ============================================================ */
    .form-group { margin-bottom:18px; }
    .form-label {
      display:block; font-size:12px; font-weight:600;
      color:#374151; margin-bottom:6px;
    }
    .form-label span { color:#ef4444; margin-left:2px; }
    .form-control {
      width:100%; padding:10px 14px;
      border:1px solid #e2e8f0; border-radius:9px;
      font-size:13px; color:#374151;
      font-family:'Inter',sans-serif; outline:none;
      transition:border .2s, box-shadow .2s;
      background:var(--white);
    }
    .form-control:focus {
      border-color:var(--accent-blue);
      box-shadow:0 0 0 3px rgba(79,142,247,.12);
    }
